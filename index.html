<!doctype html>
<html lang="ru" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RustMind</title>
    <!-- Моноширинный шрифт главного меню (терминальный вид дизайна) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Ubuntu+Mono:wght@400;700&family=PT+Mono&family=Fira+Code:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (() => {
        try {
          const persisted = window.localStorage.getItem('rustmind-ui');
          const parsed = persisted ? JSON.parse(persisted) : null;
          const theme = parsed?.state?.theme === 'light' ? 'light' : 'dark';
          document.documentElement.dataset.theme = theme;
        } catch {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
